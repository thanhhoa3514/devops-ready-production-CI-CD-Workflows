services:
  app:
    image: docker.io/${DOCKERHUB_USERNAME}/devops-tutorial:${IMAGE_TAG:-latest}
    container_name: devops-tutorial-dev-app
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3000
    ports:
      - "${APP_PORT:-3002}:3000"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
