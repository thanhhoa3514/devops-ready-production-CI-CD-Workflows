name: Deploy To VPS

on:
  workflow_run:
    workflows: ["Build And Push Docker Image"]
    types: [completed]
    branches:
      - main

env:
  DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Resolve image tag
        id: tag
        run: echo "value=sha-${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"

      - name: Validate deploy secrets and variables
        run: |
          test -n "${{ secrets.VPS_HOST }}"
          test -n "${{ secrets.VPS_USER }}"
          test -n "${{ secrets.VPS_SSH_KEY }}"
          test -n "${{ secrets.VPS_APP_DIR }}"
          test -n "${{ env.DOCKERHUB_USERNAME }}"

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        env:
          DEPLOY_IMAGE_TAG: ${{ steps.tag.outputs.value }}
          DOCKERHUB_USERNAME: ${{ env.DOCKERHUB_USERNAME }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          envs: DEPLOY_IMAGE_TAG,DOCKERHUB_USERNAME
          script: |
            set -euo pipefail
            APP_DIR="${{ secrets.VPS_APP_DIR }}"
            REPO_URL="https://github.com/${{ github.repository }}.git"
            BRANCH="${{ github.event.workflow_run.head_branch }}"

            if ! command -v git >/dev/null 2>&1; then
              echo "git is not installed on the VPS."
              exit 1
            fi

            mkdir -p "$(dirname "$APP_DIR")"

            if [ ! -d "$APP_DIR/.git" ]; then
              if [ -d "$APP_DIR" ] && [ -n "$(ls -A "$APP_DIR" 2>/dev/null)" ]; then
                echo "VPS_APP_DIR exists but is not a git repository: $APP_DIR"
                echo "Please use an empty directory or a valid cloned repository path."
                exit 1
              fi
              echo "First deploy detected. Cloning repository to $APP_DIR"
              git clone --branch "$BRANCH" --single-branch "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch --all --prune
            git pull --ff-only origin "$BRANCH"

            mkdir -p ops
            if [ ! -f ops/.env.production ]; then
              cp ops/.env.production.example ops/.env.production
            fi

            if grep -q '^IMAGE_TAG=' ops/.env.production; then
              sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=${DEPLOY_IMAGE_TAG}/" ops/.env.production
            else
              echo "IMAGE_TAG=${DEPLOY_IMAGE_TAG}" >> ops/.env.production
            fi

            if grep -q '^DOCKERHUB_USERNAME=' ops/.env.production; then
              sed -i "s/^DOCKERHUB_USERNAME=.*/DOCKERHUB_USERNAME=${DOCKERHUB_USERNAME}/" ops/.env.production
            else
              echo "DOCKERHUB_USERNAME=${DOCKERHUB_USERNAME}" >> ops/.env.production
            fi

            ./ops/deploy.sh
